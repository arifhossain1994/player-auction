<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="Logo.png" type="image/png">
  <title>Auction Control Center</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 12px 35px rgba(15, 23, 42, 0.15);
      max-width: 520px;
      width: 100%;
      padding: 32px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 2rem;
      color: #111827;
    }

    p {
      margin-top: 0;
      line-height: 1.6;
      color: #4b5563;
    }

    .links {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    .links a {
      display: block;
      text-align: center;
      text-decoration: none;
      color: #ffffff;
      background: #2563eb;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 600;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .links a:hover {
      transform: translateY(-2px);
      background: #1d4ed8;
    }
  </style>
</head>
<body>

  <main class="card">
    <h1 style="color: #2563eb; text-align: center; display: flex; align-items: center; justify-content: center; gap: 12px;">
      <img src="Logo.png" alt="Milwaukee Street League logo" style="width: 48px; height: 48px; object-fit: contain;" />
      Milwaukee Street League
    </h1>
    <h2>Auction Control Center</h2>
    <p>Select a view to continue managing the auction flow.</p>
    <div class="links">
      <a href="./projector.html" target="_blank" rel="noopener noreferrer">Projector View</a>
      <a href="./manager.html" target="_blank" rel="noopener noreferrer">Manager View</a>
      <a href="./bidder.html" target="_blank" rel="noopener noreferrer">Bidder View</a>
      <a href="./players.html" target="_blank" rel="noopener noreferrer">Players List</a>
    </div>
  </main>
</body>
</html>
