<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="logo.png" type="image/x-icon">
    <title>Projector View -Milwaukee Street League</title>
    <style>
        :root {
            --accent-gold: #ffb800;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #0b0f19;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .header-ticker {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #111622;
            padding: 15px 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid #1c2436;
        }

        .header-ticker h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            color: #ffffff;
        }

        .live-indicator {
            background: #ff3333;
            color: white;
            padding: 6px 12px;
            font-weight: bold;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .main-stage {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .showcase-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            background: #111622;
            border-radius: 12px;
            padding: 25px;
            gap: 25px;
            min-height: 480px;
        }

        .player-profile-card {
            display: flex;
            gap: 20px;
            background: #161f30;
            padding: 20px;
            border-radius: 8px;
        }

        .photo-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* CHROMATIC BASE ENGINE FOR THE REFLECTION EFFECTS */
        .chrome-badge {
            position: relative;
            overflow: hidden;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            width: fit-content;
        }

        .chrome-badge::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 30%;
            height: 200%;
            background: rgba(255, 255, 255, 0.45);
            transform: rotate(35deg);
            animation: lightSweep 4s ease-in-out infinite;
        }

        /* 1. LIQUID GOLD CHROME GRADE BADGE */
        .grade-badge-under {
            background: linear-gradient(135deg, #ffe57f 0%, #ffb800 45%, #cc9200 55%, #ffcc00 100%);
            background-size: 200% 200%;
            color: #0d111a;
            font-size: 1.2rem;
            letter-spacing: 2px;
            padding: 8px 22px;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(255, 184, 0, 0.4),
                0 4px 0 #996e00,
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid #cca200;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        /* 2. ICE BLUE / PLATINUM METALLIC ROLE TAG */
        .specialty-tag-chrome {
            background: linear-gradient(135deg, #e0f7fa 0%, #00d2ff 45%, #008ba3 55%, #00e5ff 100%);
            background-size: 200% 200%;
            color: #0d111a;
            font-size: 1rem;
            letter-spacing: 1.5px;
            padding: 6px 16px;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.35),
                0 4px 0 #00687a,
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid #00b0ff;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        /* 3. EMERALD CASH GLOW BASE PRICE LABEL */
        .base-price-chrome {
            display: inline-block;
            background: linear-gradient(135deg, #e8f5e9 0%, #39ff14 45%, #1b5e20 55%, #66ff66 100%);
            background-size: 200% 200%;
            color: #0d111a;
            font-size: 1.35rem;
            letter-spacing: 1px;
            padding: 6px 18px;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.35),
                0 4px 0 #144d05,
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid #2cfc03;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
            margin-left: 8px;
            vertical-align: middle;
        }

        .photo-frame {
            width: 180px;
            height: 220px;
            object-fit: cover;
            border-radius: 6px;
            border: 2px solid #222d42;
            background: #1c2436;
        }

        .player-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .p-name {
            margin: 15px 0 10px 0;
            font-size: 2.2rem;
            color: #ffffff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stat-item {
            background: #1c2436;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
        }

        .stat-val {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffffff;
        }

        .stat-lbl {
            font-size: 0.75rem;
            color: #7f8fa4;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .live-bid-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #161f30;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .timer-overlay {
            font-size: 3.5rem;
            font-weight: 900;
            color: #ff3333;
            margin-bottom: 10px;
        }

        .bid-lbl {
            color: #7f8fa4;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .bid-val {
            font-size: 4.5rem;
            font-weight: 900;
            color: #39ff14;
            margin: 10px 0;
        }

        .bidder-val {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
        }

        .sold-stamp {
            display: none;
        }

        .wall-of-teams {
            background: #111622;
            border-radius: 12px;
            padding: 20px;
        }

        .wall-of-teams h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #7f8fa4;
            letter-spacing: 1px;
            border-bottom: 1px solid #1c2436;
            padding-bottom: 10px;
        }

        .teams-scroll {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ledger-row {
            display: flex;
            justify-content: space-between;
            background: #161f30;
            padding: 12px 15px;
            border-radius: 6px;
        }

        @keyframes cardPopIn {
            0% {
                transform: scale(0.94);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes lightSweep {
            0% {
                left: -60%;
            }

            30% {
                left: 140%;
            }

            100% {
                left: 140%;
            }
        }

        /* FLASHY TEAM NAME CONTAINER BADGE WITH PULSE */
        .flashy-bidder {
            display: inline-block;
            color: #00e5ff;
            /* Vibrant electric cyan */
            background: rgba(0, 229, 255, 0.05);
            border: 2px solid #00e5ff;
            padding: 8px 24px;
            border-radius: 6px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2), inset 0 0 10px rgba(0, 229, 255, 0.1);
            margin-top: 10px;
            letter-spacing: 1.5px;
            animation: boxPulse 1.5s ease-in-out infinite alternate;
        }

        @keyframes boxPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 12px rgba(0, 229, 255, 0.2), inset 0 0 8px rgba(0, 229, 255, 0.1);
                border-color: rgba(0, 229, 255, 0.7);
            }

            100% {
                transform: scale(1.05);
                box-shadow: 0 0 25px rgba(0, 229, 255, 0.55), inset 0 0 12px rgba(0, 229, 255, 0.2);
                border-color: rgba(0, 229, 255, 1);
                filter: brightness(1.2);
            }
        }
    </style>
</head>

<body>

    <div class="header-ticker">
        <img src="Logo.png" alt="Logo" style="height: 50px;">
        <h1>MILWAUKEE STREET LEAGUE</h1>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="live-indicator">LIVE SCREEN</div>
        </div>
    </div>

    <div class="main-stage">
        <div id="auctionCardFrame" class="showcase-container" style="border: 2px solid #222d42;">
            <div class="player-profile-card">

                <!-- PHOTO AND GRADE COLUMN WRAPPER -->
                <div class="photo-column">
                    <img id="playerPhoto" class="photo-frame"
                        src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='220' viewBox='0 0 180 220'><rect width='100%' height='100%' fill='%231c2436'/><text x='50%' y='50%' font-family='sans-serif' font-size='14' fill='%23555' dominant-baseline='middle' text-anchor='middle'>No Photo</text></svg>"
                        alt="Player Photo"
                        onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'180\' height=\'220\' viewBox=\'0 0 180 220\'><rect width=\'100%\' height=\'100%\' fill=\'%231c2436\'/><text x=\'50%\' y=\'50%\' font-family=\'sans-serif\' font-size=\'14\' fill=\'%237f8fa4\' dominant-baseline=\'middle\' text-anchor=\'middle\'>Image Missing</text></svg>';">

                    <!-- DYNAMIC METALLIC CHROMATIC BADGE -->
                    <div id="displayGrade" class="chrome-badge grade-badge-under">Grade - -</div>
                </div>

                <div class="player-details">
                    <!-- DYNAMIC CHROMATIC ROLE BADGE -->
                    <div id="displaySpecialty" class="chrome-badge specialty-tag-chrome">Loading Role...</div>
                    <h2 id="displayPlayerName" class="p-name">Loading Profile...</h2>

                    <div class="stats-grid">
                        <div class="stat-item">
                            <div id="displayInnings" class="stat-val">-</div>
                            <div class="stat-lbl">Innings</div>
                        </div>
                        <div class="stat-item">
                            <div id="displayRuns" class="stat-val">-</div>
                            <div class="stat-lbl">Runs</div>
                        </div>
                        <div class="stat-item">
                            <div id="displayWickets" class="stat-val">-</div>
                            <div class="stat-lbl">Wickets</div>
                        </div>
                        <div
                            style="grid-column: span 3; margin-top: 15px; color:#7f8fa4; font-size:0.95rem; font-weight:bold; letter-spacing:0.5px;">
                            BASE VALUATION: <span id="displayBasePrice" class="chrome-badge base-price-chrome">$0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- LIVE PRICING BLOCK CONTAINER WITH OVERLAY -->
            <div class="live-bid-box" style="position: relative;">
                <div id="timerDisplay" class="timer-overlay">15s</div>
                <div class="bid-lbl">Highest Bidding Floor Value</div>
                <div id="displayLiveBid" class="bid-val">$0</div>
                <div id="displayCurrentBidder" class="bidder-val">Waiting for Floor Open</div>
                <div id="soldStamp" class="sold-stamp">SOLD!</div>

                <!-- OVERLAY CARD FRAME -->
                <div id="priceSoldOverlay" style="
                    display: none; 
                    position: absolute; 
                    top: 0; left: 0; width: 100%; height: 100%; 
                    background: rgba(10, 15, 26, 0.98); 
                    backdrop-filter: blur(6px);
                    border: 3px solid #ff007f;
                    border-radius: 8px;
                    z-index: 50; 
                    flex-direction: column; 
                    justify-content: center; 
                    align-items: center; 
                    box-shadow: inset 0 0 30px rgba(255, 0, 127, 0.35);
                    animation: cardPopIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.15);
                ">
                    <div style="
                        font-size: 3.8rem; 
                        font-weight: 900; 
                        color: #ff007f; 
                        text-shadow: 0 0 15px #ff007f, 0 0 30px rgba(255, 0, 127, 0.5); 
                        letter-spacing: 3px;
                        transform: rotate(-4deg);
                        margin-bottom: 8px;
                    ">
                        🔨 SOLD
                    </div>
                    <div style="
                        font-size: 1.2rem; 
                        color: #ffffff; 
                        font-weight: 600;
                        text-transform: uppercase;
                        letter-spacing: 1px;
                    ">
                        to
                    </div>

                    <div id="priceOverlayTeam" style="
                        font-size: 1.6rem; 
                        color: #ffffff; 
                        font-weight: 800;
                        text-transform: uppercase;
                        letter-spacing: 1px;
                        text-align: center;
                        max-width: 90%;
                        overflow: hidden;
                        text-overflow: ellipsis;
                    ">
                        TEAM NAME
                    </div>

                    <div id="priceOverlayAmount" style="
                        font-size: 3rem; 
                        color: #39ff14; 
                        font-weight: 900; 
                        text-shadow: 0 0 12px rgba(57, 255, 20, 0.6);
                        margin-top: 6px;
                    ">
                        $0
                    </div>
                </div>
            </div>
        </div>

        <div class="wall-of-teams">
            <h2>BOARDROOM FINANCIAL LEDGER</h2>
            <div id="teamLedgerRows" class="teams-scroll">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </div>

    <!-- SUPABASE CLIENT REALTIME LOOP ENGINE -->
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = "https://xudbfkvfuqaqzkqpgtsn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1ZGJma3ZmdXFhcXprcXBndHNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNTM3NjksImV4cCI6MjA5NzgyOTc2OX0.k_C3s_jdWStqd6BXSJEIv0uYzA04nk000v-7ChldGz0";
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const elements = {
            playerPhoto: document.getElementById('playerPhoto'),
            timerDisplay: document.getElementById('timerDisplay'),
            displayPlayerName: document.getElementById('displayPlayerName'),
            displayGrade: document.getElementById('displayGrade'),
            displaySpecialty: document.getElementById('displaySpecialty'),
            displayInnings: document.getElementById('displayInnings'),
            displayRuns: document.getElementById('displayRuns'),
            displayWickets: document.getElementById('displayWickets'),
            displayBasePrice: document.getElementById('displayBasePrice'),
            displayLiveBid: document.getElementById('displayLiveBid'),
            displayCurrentBidder: document.getElementById('displayCurrentBidder'),
            priceSoldOverlay: document.getElementById('priceSoldOverlay'),
            priceOverlayTeam: document.getElementById('priceOverlayTeam'),
            priceOverlayAmount: document.getElementById('priceOverlayAmount'),
            teamLedgerRows: document.getElementById('teamLedgerRows')
        };

        const defaultPhotoSvg = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='220' viewBox='0 0 180 220'><rect width='100%' height='100%' fill='%231c2436'/><text x='50%' y='50%' font-family='sans-serif' font-size='14' fill='%23555' dominant-baseline='middle' text-anchor='middle'>No Photo</text></svg>";
        let localTimerInterval = null;
        let currentTimeLeft = 15;

        function setText(element, text) {
            if (element) element.textContent = text;
        }

        function startLocalCountdown(seconds) {
            clearInterval(localTimerInterval);
            currentTimeLeft = seconds ?? 15;

            setText(elements.timerDisplay, `${currentTimeLeft}s`);

            localTimerInterval = setInterval(() => {
                if (currentTimeLeft > 0) {
                    currentTimeLeft--;
                    setText(elements.timerDisplay, `${currentTimeLeft}s`);
                } else {
                    clearInterval(localTimerInterval);
                }
            }, 1000);
        }

        function renderAuctionFloor(data) {
            if (!data || data.player === 'Waiting Room Open' || data.player === 'Waiting to Deploy') {
                setText(elements.displayPlayerName, 'WAITING FOR DEPLOYMENT...');
                setText(elements.displayGrade, 'Grade - —');
                setText(elements.displaySpecialty, '—');
                setText(elements.displayInnings, '—');
                setText(elements.displayRuns, '—');
                setText(elements.displayWickets, '—');
                setText(elements.displayBasePrice, '$0');
                setText(elements.displayLiveBid, '$0');
                setText(elements.displayCurrentBidder, 'FLOOR OPEN');
                clearInterval(localTimerInterval);
                setText(elements.timerDisplay, '15s');

                if (elements.playerPhoto) elements.playerPhoto.src = defaultPhotoSvg;
                if (elements.priceSoldOverlay) elements.priceSoldOverlay.style.display = 'none';
                return;
            }

            setText(elements.displayPlayerName, data.player || 'Unknown Player');
            setText(elements.displayGrade, `Grade - ${data.grade || '—'}`);
            setText(elements.displaySpecialty, data.specialty || '—');
            setText(elements.displayInnings, data.innings !== undefined ? data.innings : '0');
            setText(elements.displayRuns, data.runs !== undefined ? data.runs : '0');
            setText(elements.displayWickets, data.wickets !== undefined ? data.wickets : '0');
            setText(elements.displayBasePrice, `$${data.base_price || 0}`);
            setText(elements.displayLiveBid, `$${data.amount || 0}`);

            if (data.status === 'SOLD') {
                clearInterval(localTimerInterval);
                setText(elements.timerDisplay, '0s');
            } else {
                startLocalCountdown(data.time_left);
            }

            if (elements.playerPhoto) {
                if (data.photo) {
                    const cleanPath = data.photo.replace(/^(\.\/|\.\.\/)+/, '');
                    elements.playerPhoto.src = `./images/${cleanPath.split('/').pop()}`;
                } else {
                    elements.playerPhoto.src = defaultPhotoSvg;
                }
            }

            const bidderDisplayEl = elements.displayCurrentBidder;
            if (data.status === 'SOLD') {
                if (bidderDisplayEl) {
                    bidderDisplayEl.classList.remove('flashy-bidder');
                    bidderDisplayEl.style.border = 'none';
                    bidderDisplayEl.style.background = 'none';
                    bidderDisplayEl.textContent = `SOLD TO ${data.bidder || 'UNKNOWN TEAM'}`;
                }

                if (elements.priceSoldOverlay) {
                    if (elements.priceOverlayTeam) elements.priceOverlayTeam.textContent = (data.bidder || 'UNKNOWN TEAM').toUpperCase();
                    if (elements.priceOverlayAmount) elements.priceOverlayAmount.textContent = `$${data.amount || 0}`;
                    elements.priceSoldOverlay.style.display = 'flex';
                }
            } else {
                if (elements.priceSoldOverlay) elements.priceSoldOverlay.style.display = 'none';

                if (bidderDisplayEl) {
                    bidderDisplayEl.style.border = '';
                    bidderDisplayEl.style.background = '';

                    if (data.bidder === 'Base Price') {
                        bidderDisplayEl.classList.remove('flashy-bidder');
                        bidderDisplayEl.textContent = 'OPENING VALUATION';
                    } else if (!data.bidder || data.bidder === 'AVAILABLE') {
                        bidderDisplayEl.classList.remove('flashy-bidder');
                        bidderDisplayEl.textContent = 'AVAILABLE';
                    } else {
                        bidderDisplayEl.classList.add('flashy-bidder');
                        bidderDisplayEl.textContent = data.bidder;
                    }
                }
            }
        }

        async function fetchLedgerStates() {
            const { data: teams } = await supabase.from('bidders').select('*').order('name', { ascending: true });
            const container = elements.teamLedgerRows;
            if (!container || !teams) return;

            container.innerHTML = '';
            teams.forEach(team => {
                const count = Array.isArray(team.team) ? team.team.length : 0;

                let rosterHtml = '';
                if (count > 0) {
                    const playerStrings = team.team.map(player => {
                        const name = player.player_name || 'Unknown Player';
                        const price = player.bid_win_price !== undefined ? player.bid_win_price : 0;
                        return `<span style="color:#ffffff;">${name}:</span> <b style="color:var(--accent-gold);">$${price}</b>`;
                    });

                    rosterHtml = `
                        <div style="margin-top: 8px; padding-top: 8px; border-top: 1px dashed #222d42; font-size: 0.85rem; display: flex; flex-wrap: wrap; gap: 12px; align-items: center;">
                            ${playerStrings.join(' <span style="color:#222d42; font-weight: bold;">|</span> ')}
                        </div>`;
                } else {
                    rosterHtml = `
                        <div style="margin-top: 8px; padding-top: 8px; border-top: 1px dashed #222d42; font-size: 0.85rem; color:#4f5d73; font-style: italic;">
                            No signings secured
                        </div>`;
                }

                container.innerHTML += `
                    <div class="ledger-row" style="flex-direction: column; align-items: stretch;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-weight:bold; font-size: 1.8rem; color: #ffffff; letter-spacing: 0.5px;">${team.name}</span>
                            <span style="font-size: 0.9rem; color: #7f8fa4;">Roster: <b style="color:var(--accent-gold);">${count}</b> | Budget: <b style="color:#39ff14;">$${team.budget}</b></span>
                        </div>
                        ${rosterHtml}
                    </div>`;
            });
        }

        async function initProjectorStream() {
            const { data: currentFloor } = await supabase.from('current_auction').select('*').eq('id', 1).single();
            if (currentFloor) renderAuctionFloor(currentFloor);
            await fetchLedgerStates();

            supabase
                .channel('projector-realtime')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'current_auction', filter: 'id=eq.1' }, payload => {
                    if (payload?.new) renderAuctionFloor(payload.new);
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'bidders' }, () => {
                    fetchLedgerStates();
                })
                .subscribe();
        }

        initProjectorStream();
    </script>
</body>

</html>
